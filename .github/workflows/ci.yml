name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint code
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Run training pipeline (fast mode)
        run: python main.py --samples 500

  deploy-hf:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        run: |
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          HF_URL="https://awais-dev-ai:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/awais-dev-ai/Intern-Performance-Predictor"

          # Hugging Face Spaces reject binary files (e.g. images/*.png) via plain
          # git push. Build a clean tree with only what the Docker Space needs.
          rm -rf hf_push && mkdir hf_push
          for d in app.py main.py wsgi.py Dockerfile docker-compose.yml requirements.txt src ui .dockerignore README.md; do
            cp -r "$d" hf_push/ 2>/dev/null || true
          done

          cd hf_push
          git init -q
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git remote add hf "$HF_URL"
          git fetch hf main -q || true
          git checkout -b main -q 2>/dev/null || git checkout -B main -q
          git add -A
          git commit -q -m "Deploy from ${{ github.sha }}" || echo "Nothing to commit"
          git push hf main --force
