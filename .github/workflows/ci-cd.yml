name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger via GitHub UI

permissions:
  contents: read

jobs:
  # --- JOB 1: LINTING (Fast code quality check) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint code
        run: ruff check .

  # --- JOB 2: TESTING & TRAINING (The actual CI) ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        # Ensures your code works across different Python versions
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

      # CRITICAL IMPROVEMENT: Train the model ONCE here (fast mode)
      - name: Train model (fast validation)
        run: python main.py --samples 500
        timeout-minutes: 5  # Fails fast if training hangs

      # Save the trained model so we don't retrain it later
      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ matrix.python-version }}
          path: models/
          if-no-files-found: error  # Instantly fails if main.py didn't save the model

  # --- JOB 3: DEPLOYMENT (The actual CD) ---
  deploy-hf:
    runs-on: ubuntu-latest
    needs: [lint, test]
    # ONLY deploys when code is merged to main/master (ignores PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write  # Required to push to the Hugging Face Space repo
    steps:
      # 1. Checkout the source code (app.py, Dockerfile, src/, etc.)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Download the pre-trained model from the 'test' job (using 3.12 as the source)
      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model-3.12
          path: models/

      # 3. Verify the model exists before deploying (fail-fast safety net)
      - name: Verify model artifacts
        run: |
          ls -la models/
          if [ ! -f "models/best_model.pkl" ]; then
            echo "❌ ERROR: best_model.pkl not found!"
            exit 1
          fi
          echo "✅ Model artifacts verified."

      # 4. Build a clean deployment bundle (only what the Space needs)
      - name: Prepare deployment bundle
        run: |
          set -e  # Exit on any error
          mkdir -p deploy_bundle

          # Copy application code (fail loudly if critical files are missing)
          cp -v app.py main.py requirements.txt Dockerfile deploy_bundle/ 2>/dev/null
          cp -rv src/ deploy_bundle/ 2>/dev/null
          cp -rv ui/ deploy_bundle/ 2>/dev/null  # Added ui/ since app.py imports it

          # Copy the pre-trained model (downloaded from the CI artifact)
          cp -rv models/ deploy_bundle/

          # Remove Python cache files to keep the Space lightweight
          find deploy_bundle -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true

          echo "📦 Deployment bundle contents:"
          ls -la deploy_bundle/

      # 5. Deploy using git push to Hugging Face (reliable method)
      - name: Deploy to Hugging Face Space
        run: |
          set -e
          cd deploy_bundle
          git init -q
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git remote add hf "https://huggingface.co/spaces/awais-dev-ai/Intern-Performance-Predictor"
          git fetch hf main -q || true
          git checkout -b main -q 2>/dev/null || git checkout -B main -q
          git add -A
          git commit -q -m "Deploy from ${{ github.sha }}" || echo "Nothing to commit"
          git push hf main --force
