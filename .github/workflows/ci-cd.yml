name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- JOB 1: LINTING ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint code
        run: ruff check .

  # --- JOB 2: TESTING & VALIDATION TRAINING ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/ -v
      - name: Validate training pipeline (fast mode)
        run: python main.py --samples 500
        timeout-minutes: 5

  # --- JOB 3: TRAIN ON KAGGLE (Only on main pushes) ---
  train-kaggle:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Train model on Kaggle
        uses: KevKibe/kaggle-script-action@v1.0.5
        with:
          username: ${{ secrets.KAGGLE_USERNAME }}
          key: ${{ secrets.KAGGLE_KEY }}
          title: "Train Full Model"
          custom_script: "python main.py"
          enable_gpu: false
          enable_internet: true

      - name: Download trained model from Kaggle
        run: |
          pip install kaggle
          mkdir -p models
          kaggle kernels output ${{ secrets.KAGGLE_USERNAME }}/train-full-model -p ./models/

      - name: Upload model to Hugging Face Hub (via API)
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi, upload_file
          import os
          api = HfApi()
          
          if os.path.exists('models/best_model.pkl'):
              upload_file(
                  path_or_fileobj='models/best_model.pkl',
                  path_in_repo='models/best_model.pkl',
                  repo_id='awais-dev-ai/Intern-Performance-Predictor',
                  repo_type='space',
                  token='${{ secrets.HF_TOKEN }}'
              )
              print('✅ Model uploaded to Hugging Face Hub.')
          else:
              print('❌ models/best_model.pkl not found!')
              exit(1)
          
          if os.path.exists('models/model_metadata.json'):
              upload_file(
                  path_or_fileobj='models/model_metadata.json',
                  path_in_repo='models/model_metadata.json',
                  repo_id='awais-dev-ai/Intern-Performance-Predictor',
                  repo_type='space',
                  token='${{ secrets.HF_TOKEN }}'
              )
              print('✅ Metadata uploaded to Hugging Face Hub.')
          "

  # --- JOB 4: DEPLOY CODE TO HUGGING FACE (NO MODEL IN GIT) ---
  deploy-hf:
    runs-on: ubuntu-latest
    needs: [train-kaggle]
    if: always() && needs.train-kaggle.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare deployment bundle (code only)
        run: |
          set -e
          mkdir -p deploy_bundle
          cp -v app.py main.py requirements.txt Dockerfile deploy_bundle/ 2>/dev/null
          cp -rv src/ deploy_bundle/ 2>/dev/null
          cp -rv ui/ deploy_bundle/ 2>/dev/null
          find deploy_bundle -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          echo "📦 Deployment bundle contents (no large models):"
          ls -la deploy_bundle/

      - name: Deploy code to Hugging Face Space
        run: |
          set -e
          cd deploy_bundle
          git init -q
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git remote add hf "https://awais-dev-ai:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/awais-dev-ai/Intern-Performance-Predictor"
          git fetch hf main -q || true
          git checkout -b main -q 2>/dev/null || git checkout -B main -q
          git add -A
          git commit -q -m "Deploy code from ${{ github.sha }}" || echo "Nothing to commit"
          git push hf main --force