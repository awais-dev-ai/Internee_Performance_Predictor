name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- JOB 1: LINTING ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint code
        run: ruff check .

  # --- JOB 2: TESTING & VALIDATION TRAINING ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/ -v
      - name: Validate training pipeline (fast mode)
        run: python main.py --samples 500
        timeout-minutes: 5

  # --- JOB 3: DEPLOY CODE TO HUGGING FACE ---
  deploy-hf:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare deployment bundle
        run: |
          set -e
          mkdir -p deploy_bundle
          # Copy all essential files, including README
          cp -v app.py main.py requirements.txt Dockerfile README.md deploy_bundle/
          cp -rv src/ deploy_bundle/
          cp -rv ui/ deploy_bundle/
          # Remove __pycache__ if any
          find deploy_bundle -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          echo "📦 Deployment bundle contents:"
          ls -la deploy_bundle/

      - name: Deploy code to Hugging Face Space
        run: |
          set -e
          cd deploy_bundle
          git init -q
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git remote add hf "https://awais-dev-ai:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/awais-dev-ai/Intern-Performance-Predictor"
          git fetch hf main -q || true
          git checkout -b main -q 2>/dev/null || git checkout -B main -q
          git add -A
          git commit -q -m "Deploy code from ${{ github.sha }}" || echo "Nothing to commit"
          git push hf main --force