name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger via GitHub UI

permissions:
  contents: read

jobs:
  # --- JOB 1: LINTING (Fast code quality check) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint code
        run: ruff check .

  # --- JOB 2: TESTING & VALIDATION TRAINING ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        # Ensures your code works across different Python versions
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

      # --- VALIDATION TRAINING (Runs fast, just to check if the pipeline breaks) ---
      - name: Validate training pipeline (fast mode)
        run: python main.py --samples 500
        timeout-minutes: 5  # Fails fast if training hangs

      # Note: We are NOT uploading this 500-sample model.
      # The deployment will use the REAL model from the repo's models/ folder.

  # --- JOB 3: DEPLOYMENT (Uses the pre-trained model from the repo) ---
  deploy-hf:
    runs-on: ubuntu-latest
    needs: [lint, test]
    # ONLY deploys when code is merged to main/master (ignores PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write  # Required to push to the Hugging Face Space repo
    steps:
      # 1. Checkout the source code (which includes your REAL model in models/)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Verify the REAL pre-trained model exists in the repository
      - name: Verify real model artifacts exist in repo
        run: |
          ls -la models/
          if [ ! -f "models/best_model.pkl" ]; then
            echo "❌ ERROR: best_model.pkl not found in the repository!"
            echo "Please train the full model locally and commit it to the models/ folder."
            exit 1
          fi
          echo "✅ Real model artifacts verified."

      # 3. Build a clean deployment bundle (copy code + REAL model from repo)
      - name: Prepare deployment bundle
        run: |
          set -e  # Exit on any error
          mkdir -p deploy_bundle

          # Copy application code
          cp -v app.py main.py requirements.txt Dockerfile deploy_bundle/ 2>/dev/null
          cp -rv src/ deploy_bundle/ 2>/dev/null
          cp -rv ui/ deploy_bundle/ 2>/dev/null

          # Copy the REAL pre-trained model (directly from the checked-out repo)
          cp -rv models/ deploy_bundle/

          # Remove Python cache files to keep the Space lightweight
          find deploy_bundle -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true

          echo "📦 Deployment bundle contents:"
          ls -la deploy_bundle/

      # 4. Deploy using git push to Hugging Face
      - name: Deploy to Hugging Face Space
        run: |
          set -e
          cd deploy_bundle
          git init -q
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git remote add hf "https://awais-dev-ai:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/awais-dev-ai/Intern-Performance-Predictor"
          git fetch hf main -q || true
          git checkout -b main -q 2>/dev/null || git checkout -B main -q
          git add -A
          git commit -q -m "Deploy from ${{ github.sha }}" || echo "Nothing to commit"
          git push hf main --force